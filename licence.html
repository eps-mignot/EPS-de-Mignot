<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Licence EPS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Génération de licence EPS</h1>
</header>

<main class="container">

  <section class="card">
    <h2>Activer votre licence</h2>

    <form id="formLicence">

      <label>Email :</label>
      <input type="email" id="email" required>

      <label>Produit :</label>
      <select id="productID">
        <option value="TOURNOI_EPS">Tournoi EPS</option>
        <option value="APPRECIATIONS_EPS">Appréciations EPS</option>
        <option value="APPRECIATIONS_PP">Appréciations Prof Principal</option>
      </select>

      <label>Type de licence :</label>
      <div class="radio-group">
        <label><input type="radio" name="typeLicence" value="annuelle" checked> Licence annuelle</label>
        <label><input type="radio" name="typeLicence" value="vie"> Licence à vie</label>
      </div>

      <label>PCID de la machine :</label>
      <input type="text" id="pcid" required>

      <button type="submit" class="btn">Envoyer</button>

    </form>

    <div id="result"></div>
  </section>

</main>

<footer class="footer">
  © 2026 – EPS de Mignot
</footer>

<script>
document.getElementById("formLicence").addEventListener("submit", async function(e) {
    e.preventDefault();

    const payload = {
        email: document.getElementById("email").value,
        pcid: document.getElementById("pcid").value,
        typeLicence: document.querySelector('input[name="typeLicence"]:checked').value,
        productID: document.getElementById("productID").value
    };

    const res = await fetch("https://TON_WORKER.cloudflare.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if (res.ok) {
        document.getElementById("result").innerHTML = "✔ Licence envoyée par email.";
    } else {
        document.getElementById("result").innerHTML = "❌ Erreur lors de la génération.";
    }
});
</script>

</body>
</html>
