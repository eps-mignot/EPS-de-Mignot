<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Licence EPS</title>
</head>
<body>

  <h2>Génération de licence EPS</h2>

  <label>Email :</label><br>
  <input type="email" id="email" required><br><br>

  <label>Produit :</label><br>
  <select id="productID">
    <option value="TOURNOI_EPS">Tournoi EPS</option>
    <option value="APPRECIATIONS_EPS">Appréciations EPS</option>
    <option value="APPRECIATIONS_PP">Appréciations Prof Principal</option>
  </select><br><br>

  <label>Type de licence :</label><br>
  <input type="radio" name="typeLicence" value="annuelle" checked> Licence annuelle<br>
  <input type="radio" name="typeLicence" value="vie"> Licence à vie<br><br>

  <label>PCID de la machine :</label><br>
  <input type="text" id="pcid" required><br><br>

  <button onclick="envoyer()">Envoyer</button>

  <pre id="resultat"></pre>

  <script>
    async function envoyer() {
      const email = document.getElementById("email").value;
      const productID = document.getElementById("productID").value;
      const pcid = document.getElementById("pcid").value;
      const typeLicence = document.querySelector('input[name="typeLicence"]:checked').value;

      if (!email || !pcid) {
        alert("Email et PCID sont obligatoires.");
        return;
      }

      const payload = {
        email: email,
        productID: productID,
        pcid: pcid,
        typeLicence: typeLicence
      };

      try {
        const response = await fetch("https://long-firefly-0063.florianmignot.workers.dev/", {
 	method: "POST",
 	headers: { "Content-Type": "application/json" },
 	body: JSON.stringify(payload)
      });


        const texte = await response.text();
        document.getElementById("resultat").textContent = "Réponse Worker : " + texte;
      } catch (err) {
        document.getElementById("resultat").textContent = "Erreur : " + err;
      }
    }
  </script>

</body>
</html>
