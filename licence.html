<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Licence EPS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Génération de licence EPS</h1>
</header>

<main class="container">

  <section class="card">

    <h2>Activation de licence</h2>

    <label>Email :</label>
    <input type="email" id="email" required class="input">

    <label>Produit :</label>
    <select id="productID" class="input">
      <option value="TOURNOI_EPS">Tournoi EPS</option>
      <option value="APPRECIATIONS_EPS">Appréciations EPS</option>
      <option value="APPRECIATIONS_PP">Appréciations Prof Principal</option>
    </select>

    <label>Type de licence :</label>
    <div class="radio-group">
      <label><input type="radio" name="typeLicence" value="annuelle" checked> Licence annuelle</label>
      <label><input type="radio" name="typeLicence" value="vie"> Licence à vie</label>
    </div>

    <label>PCID de la machine :</label>
    <input type="text" id="pcid" required class="input">

    <button onclick="envoyer()" class="btn">Envoyer</button>

    <pre id="resultat" class="result"></pre>

  </section>

</main>

<footer class="footer">
  © 2026 – EPS de Mignot
</footer>

<script>
async function envoyer() {
  const email = document.getElementById("email").value;
  const productID = document.getElementById("productID").value;
  const pcid = document.getElementById("pcid").value;
  const typeLicence = document.querySelector('input[name="typeLicence"]:checked').value;

  if (!email || !pcid) {
    alert("Email et PCID sont obligatoires.");
    return;
  }

  const payload = {
    email: email,
    productID: productID,
    pcid: pcid,
    typeLicence: typeLicence
  };

  try {
    const response = await fetch("https://long-firefly-0063.florianmignot.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const texte = await response.text();
    document.getElementById("resultat").textContent = "Réponse Worker : " + texte;
  } catch (err) {
    document.getElementById("resultat").textContent = "Erreur : " + err;
  }
}
</script>

</body>
</html>
